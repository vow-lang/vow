name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/spec/**"
      - "website/**"
      - "scripts/build_docs_site.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: python -m pip install --require-hashes -r website/requirements.txt
      - name: Assemble site source from canonical spec
        run: python3 scripts/build_docs_site.py
      - name: Build site (strict)
        run: mkdocs build --strict --config-file website/mkdocs.yml
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
