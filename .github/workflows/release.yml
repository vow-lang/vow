name: Release

# Hybrid semantic-release: on every push to main, `plan` runs semantic-release in
# dry-run to decide whether a release is due and at what version; `build-package`
# builds the full cross-platform toolchain (Linux x86_64/aarch64 + macOS, with
# ESBMC verification) at that version; `publish` runs semantic-release for real to
# tag, generate the CHANGELOG + notes, and create the GitHub Release with the
# pre-built toolchains attached. Replaces the previous manual workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  ESBMC_VERSION: "8.1"
  # SHA-256 of release-ubuntu-24.04--b.RelWithDebInfo.-e.OFF.zip from
  # https://github.com/esbmc/esbmc/releases/tag/v8.1.
  ESBMC_SHA256: daec35870fdee07e1298676646ae6cf1d631c6272594e7e86479cdb9caa67ec5

jobs:
  plan:
    name: Decide release version
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.sr.outputs.new_release_published }}
      version: ${{ steps.sr.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: lts/*
      - name: semantic-release (dry run — compute next version)
        id: sr
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-package:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: plan
    if: needs.plan.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-24.04
            verify: true
          # The pinned ESBMC zip is Ubuntu x86_64-only; Linux aarch64 and
          # macOS packages use --no-verify while keeping the fixed-point check.
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            verify: false
          - os: macos
            arch: aarch64
            runner: macos-15
            verify: false
          - os: macos
            arch: x86_64
            runner: macos-15-intel
            verify: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set workspace version
        run: bash .github/semantic-release/set-version.sh "${{ needs.plan.outputs.version }}"
      - name: Cache ESBMC
        id: cache-esbmc
        if: matrix.verify
        uses: actions/cache@v6
        with:
          path: ~/esbmc
          key: esbmc-${{ env.ESBMC_VERSION }}-${{ env.ESBMC_SHA256 }}-ubuntu-24.04
      - name: Install ESBMC
        if: matrix.verify && steps.cache-esbmc.outputs.cache-hit != 'true'
        env:
          ESBMC_ZIP: release-ubuntu-24.04--b.RelWithDebInfo.-e.OFF.zip
        run: |
          ESBMC_URL="https://github.com/esbmc/esbmc/releases/download/v$ESBMC_VERSION/$ESBMC_ZIP"

          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            -o "/tmp/$ESBMC_ZIP" "$ESBMC_URL"

          echo "$ESBMC_SHA256  /tmp/$ESBMC_ZIP" | sha256sum --check --strict -

          unzip -q "/tmp/$ESBMC_ZIP" -d ~/esbmc
          rm "/tmp/$ESBMC_ZIP"
      - name: Add ESBMC to PATH
        if: matrix.verify
        run: echo "$HOME/esbmc/bin" >> "$GITHUB_PATH"
      - name: Build Rust artifacts
        run: cargo build --all --release
      - name: Bootstrap compiler
        run: |
          if [ "${{ matrix.verify }}" = "true" ]; then
            scripts/bootstrap.sh --skip-cargo
          else
            scripts/bootstrap.sh --skip-cargo --no-verify
          fi
      - name: Package toolchain
        run: |
          scripts/package-toolchain.sh \
            --version "${{ needs.plan.outputs.version }}" \
            --os "${{ matrix.os }}" \
            --arch "${{ matrix.arch }}" \
            --output-dir release
      - name: Smoke-test packaged toolchain
        run: |
          asset="vow-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          tar -xzf "release/$asset" -C "$tmp"
          prefix="$tmp/vow-${{ needs.plan.outputs.version }}"
          runtime_lib="$prefix/lib/vow/libvow_runtime.a"
          shim_lib="$prefix/lib/vow/libvow_clif_shim.a"
          for packaged_lib in "$runtime_lib" "$shim_lib"; do
            if [ ! -f "$packaged_lib" ]; then
              echo "::error::Missing packaged library: $packaged_lib"
              exit 1
            fi
          done
          cat > "$tmp/hello.vow" <<'EOF'
          module Hello

          fn main() -> i32 [io] {
              print_str("Hello, world!");
              0
          }
          EOF
          "$prefix/bin/vow" --help > /dev/null
          (
            cd "$tmp"
            VOW_RUNTIME_PATH="$runtime_lib" \
              VOW_CLIF_SHIM_PATH="$shim_lib" \
              "$prefix/bin/vow" build --no-verify hello.vow -o hello
            ./hello
          )
      - name: Upload toolchain package
        uses: actions/upload-artifact@v7
        with:
          name: toolchain-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            release/vow-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            release/vow-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [plan, build-package]
    if: needs.plan.outputs.published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: lts/*
      - name: Download packaged toolchains
        uses: actions/download-artifact@v8
        with:
          pattern: toolchain-*
          path: release
          merge-multiple: true
      - name: semantic-release (publish)
        uses: cycjimmy/semantic-release-action@v6.0.0
        with:
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/git@10
            @semantic-release/exec@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
