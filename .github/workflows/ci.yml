name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ESBMC_VERSION: "8.1"
  # SHA-256 of the ESBMC release artifact. Must be updated in lockstep with
  # ESBMC_VERSION; it is also part of the cache key so a rotation forces
  # a fresh download + verify even if the version is unchanged.
  ESBMC_SHA256: daec35870fdee07e1298676646ae6cf1d631c6272594e7e86479cdb9caa67ec5

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Cache ESBMC
        id: cache-esbmc
        uses: actions/cache@v5
        with:
          path: ~/esbmc
          key: esbmc-${{ env.ESBMC_VERSION }}-${{ env.ESBMC_SHA256 }}-ubuntu-24.04
      - name: Install ESBMC
        if: steps.cache-esbmc.outputs.cache-hit != 'true'
        env:
          ESBMC_ZIP: release-ubuntu-24.04--b.RelWithDebInfo.-e.OFF.zip
        run: |
          ESBMC_URL="https://github.com/esbmc/esbmc/releases/download/v$ESBMC_VERSION/$ESBMC_ZIP"

          curl --fail --silent --show-error --location --proto '=https' --tlsv1.2 \
            -o "/tmp/$ESBMC_ZIP" "$ESBMC_URL"

          echo "$ESBMC_SHA256  /tmp/$ESBMC_ZIP" | sha256sum --check --strict -

          unzip -q "/tmp/$ESBMC_ZIP" -d ~/esbmc
          rm "/tmp/$ESBMC_ZIP"
      - run: echo "$HOME/esbmc/bin" >> "$GITHUB_PATH"
      - run: cargo build --all
      - name: Build concatenated self-hosted compiler
        run: |
          bash scripts/concat_vow.sh clif > /tmp/compiler_clif.vow
          ulimit -v 2000000
          ./target/debug/vow build --no-verify --no-cache /tmp/compiler_clif.vow -o /tmp/vowc_concat
          test -x /tmp/vowc_concat
      - run: cargo llvm-cov --all --lcov --output-path lcov.info
      - run: cargo clippy --all -- -D warnings
      - run: cargo fmt --all -- --check
      # Phase 3 (issue #199) — non-blocking region-pass surface scan against
      # `compiler/*.vow`. Surfaces RegionConflict diagnostics for the
      # Phase 5 source fix-ups without failing the build (per the issue's
      # "non-blocking warnings" requirement). Spec §4.4 is still strict —
      # the rejection happens in actual builds, just not in this informational
      # scan.
      - name: Region inference surface scan (non-blocking)
        continue-on-error: true
        run: |
          bash scripts/concat_vow.sh ir > /tmp/region_scan.vow
          ./target/debug/vow build --no-verify --dump-ir /tmp/region_scan.vow > /tmp/region_scan.out 2> /tmp/region_scan.err || true
          if grep -q "RegionConflict" /tmp/region_scan.out /tmp/region_scan.err 2>/dev/null; then
            echo "::warning::RegionConflict diagnostics detected in compiler/*.vow (Phase 5 source fix-ups needed)"
            grep -A2 "RegionConflict" /tmp/region_scan.out /tmp/region_scan.err | head -40
          else
            echo "no RegionConflict warnings in compiler/*.vow"
          fi
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: pmatos/vow-lang
          files: lcov.info
