name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4
        with:
          fetch-depth: 50

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@6f6c0f4c0f90f1d1e9f5e3a6f5c2e5a74f8e4e31 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          use_sticky_comment: false
          include_fix_links: true
          track_progress: false

          additional_permissions: |
            actions: read

          claude_args: |
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(ls:*),Bash(wc:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a pull request for Vow, a systems programming language with
            formal verification via ESBMC bounded model checking. Read CLAUDE.md for full
            project context before starting.

            ## Review Protocol

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changes.
            2. For each changed file, use `Read` to examine the full file (not just the diff
               hunk) so you understand the surrounding context.
            3. Run `gh pr checks ${{ github.event.pull_request.number }}` to see CI status.
               If any checks failed, note what failed and whether the PR changes relate.
            4. Run `git log --oneline -20` to see recent commit style and context.

            ## Vow Project Invariants — Check Every PR Against These

            ### Dual Compiler Sync
            Vow has TWO compilers that must stay in sync:
            - **Rust stage 0**: workspace crates `vow-syntax/`, `vow-types/`, `vow-ir/`,
              `vow-codegen/`, `vow-verify/`, `vow-diag/`, `vow-runtime/`, `vow/`,
              `vow-clif-shim/` (all `.rs` files)
            - **Self-hosted**: `compiler/*.vow` modules (span, token, lexer, ast, parser,
              types, env, checker, ir, ir_printer, lower, clif, c_emitter, verifier, diag,
              main)

            If a PR changes compiler behavior in one, the other MUST also be updated.
            Flag this loudly if one side is missing. Examples:
            - New AST node in `vow-syntax/src/lib.rs` but not in `compiler/ast.vow`
            - New opcode in `vow-ir/src/lib.rs` but not in `compiler/ir.vow`
            - New builtin in `vow-types/src/check.rs` but not in `compiler/checker.vow`
            - New CLI flag in `vow/src/main.rs` but not in `compiler/main.vow`

            ### Spec Sync (docs/spec/*.md)
            `docs/spec/` is the canonical specification:
            - `grammar.md` — types, operators, effects, builtins, control flow, structs,
              enums, match, methods, modules
            - `cli.md` — CLI commands, flags, JSON output schemas
            - `contracts.md` — vow blocks, requires/ensures/invariant, blame
            - `errors.md` — diagnostic error codes

            Any PR that adds or changes syntax, semantics, types, builtins, operators,
            effects, or CLI flags MUST update the corresponding spec file. Also check
            that `scripts/generate_help.py` was re-run if grammar.md or cli.md changed.

            ### Bootstrap Integrity
            The self-hosted compiler must produce byte-identical binaries (fixed point).
            `scripts/bootstrap.sh` validates this. If a PR changes IR lowering, codegen,
            or the Cranelift shim, note that bootstrap verification is needed.

            ### Language Design Principles
            Vow is for agents, not humans. New features must meet ALL THREE criteria:
            1. Does not make verification harder (ESBMC pipeline stays simple)
            2. Eliminates a class of agent bugs
            3. Makes agentic coding easier
            Syntactic convenience alone is insufficient. Flag features that expand the
            compiler surface area without clear verification benefit.

            ### Key Correctness Invariants
            - Line comments only (`//`). No block comments (`/* */`).
            - Canonical form: `parse -> print -> parse` must be idempotent.
            - Effects are explicit and sorted alphabetically: [IO, Panic, Read, Unsafe, Write].
            - Vow blocks have blame: `requires` -> Caller, `ensures`/`invariant` -> Callee.
            - Linear types: `linear struct` values consumed exactly once.
            - Checked arithmetic (`+!`, `-!`) vs wrapping arithmetic (`+`, `-`) are distinct
              token kinds.
            - VowVec layout: `{ ptr: *mut u8, len: usize, cap: usize }` = 24 bytes.
            - Integer literals always emit ConstI64 (no ConstI32).
            - BTreeMap (not HashMap) for deterministic codegen in vow-clif-shim.

            ### Self-Hosted Compiler Gotchas
            If `compiler/*.vow` files are changed, watch for:
            - Chained field access requiring annotated `let` bindings
              (`e.ts.strs[i]` is wrong; use intermediate typed lets).
            - `__vow_string_eq` returns i64 (not bool).
            - `lctx_assign` does in-place mutation; scope restore cannot undo it.
              If-else branches need explicit save/restore of mutation variables.
            - Vec indexed assignment `v[i] = val` must emit `__vow_vec_set_val`.
            - FieldGet results are NOT auto-tagged in `inst_struct_type`.

            ## What to Review

            Focus on (in priority order):
            1. **Dual compiler / spec sync violations** — highest-impact issues. Missing
               sync is a blocking concern.
            2. **Correctness** — logic bugs, missing edge cases, broken invariants.
            3. **Verification impact** — does this change make ESBMC verification harder
               or more fragile? Does the C emitter model remain sound?
            4. **Safety** — memory safety, no panics in compiler code, no undefined behavior
               in runtime/shim FFI code.
            5. **Style and clarity** — consistent naming, sparse comments, idiomatic Rust
               or Vow patterns.

            Do NOT review for:
            - Generic style nitpicks unrelated to project conventions
            - Missing tests (the full test suite is run separately)
            - Documentation formatting preferences

            ## Output Format

            Post a single top-level comment via `gh pr comment` with:
            - A brief summary (2-3 sentences) of what the PR does
            - A section for any **blocking concerns** (dual-compiler sync, spec sync,
              broken invariants)
            - A section for **suggestions** (non-blocking improvements)

            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`)
            for specific code-level issues, pinpointing the exact file and line.

            If the PR is clean with no issues, say so concisely. Do not pad the review
            with filler. Only post GitHub comments — do not submit review text as
            conversation messages.
